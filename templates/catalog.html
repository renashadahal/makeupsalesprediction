{% extends "base.html" %}
{% block content %}
<div class="max-w-4xl mx-auto px-4 pb-12 space-y-8">

    <div class="border-b border-noireText/10 pb-4 flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
        <div>
            <h2 class="text-3xl text-noireText font-serif">Master Catalog</h2>
        </div>
        <a href="{{ url_for('inventory_view') }}" class="w-full sm:w-auto px-4 py-2 bg-white text-noireText border border-noireText/10 hover:bg-velvet/50 text-center font-medium rounded-xl text-xs uppercase tracking-wider transition-all h-fit">
            Back to Inventory Ledger
        </a>
    </div>

    <div class="bg-parchment p-6 rounded-2xl border border-noireText/5 shadow-md">
        <form action="{{ url_for('update_catalog') }}" method="POST" class="space-y-6">
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-5 text-xs tracking-wide">
                
                <div class="flex flex-col gap-1">
                    <label for="store_id" class="block font-semibold mb-1.5 uppercase text-noireText/70 tracking-widest">Branch ID</label>
                    <input type="text" id="store_id" name="store_id" value="ST-01" required class="w-full px-4 py-2.5 rounded-xl bg-white border border-noireText/10 text-noireText focus:outline-none focus:border-dustyRose focus:ring-1 focus:ring-dustyRose transition-all">
                </div>

                <div class="flex flex-col gap-1">
                    <label for="product_id" class="block font-semibold mb-1.5 uppercase text-noireText/70 tracking-widest">SKU / Product ID</label>
                    <input type="text" id="product_id" name="product_id" placeholder="e.g. PROD-882" required class="w-full px-4 py-2.5 rounded-xl bg-white border border-noireText/10 text-noireText focus:outline-none focus:border-dustyRose focus:ring-1 focus:ring-dustyRose transition-all">
                </div>

                <div class="flex flex-col gap-1">
                    <label for="brand" class="block font-semibold mb-1.5 uppercase text-noireText/70 tracking-widest">Brand Name</label>
                    <input type="text" id="brand" name="brand" placeholder="e.g. Maybelline" required class="w-full px-4 py-2.5 rounded-xl bg-white border border-noireText/10 text-noireText focus:outline-none focus:border-dustyRose focus:ring-1 focus:ring-dustyRose transition-all">
                </div>

                <div class="flex flex-col gap-1">
                    <label for="product_name" class="block font-semibold mb-1.5 uppercase text-noireText/70 tracking-widest">Product Name</label>
                    <input type="text" id="product_name" name="product_name" placeholder="e.g. Fit Me Foundation" required class="w-full px-4 py-2.5 rounded-xl bg-white border border-noireText/10 text-noireText focus:outline-none focus:border-dustyRose focus:ring-1 focus:ring-dustyRose transition-all">
                </div>

                <div class="flex flex-col gap-1">
                    <label for="subcategory" class="block font-semibold mb-1.5 uppercase text-noireText/70 tracking-widest">Subcategory</label>
                    <input type="text" id="subcategory" name="subcategory" placeholder="e.g. Foundation" required class="w-full px-4 py-2.5 rounded-xl bg-white border border-noireText/10 text-noireText focus:outline-none focus:border-dustyRose focus:ring-1 focus:ring-dustyRose transition-all">
                </div>

                <div class="flex flex-col gap-1">
                    <label for="price" class="block font-semibold mb-1.5 uppercase text-noireText/70 tracking-widest">Base Price ($)</label>
                    <input type="number" step="0.01" id="price" name="price" placeholder="0.00" required class="w-full px-4 py-2.5 rounded-xl bg-white border border-noireText/10 text-noireText focus:outline-none focus:border-dustyRose focus:ring-1 focus:ring-dustyRose transition-all">
                </div>

            </div>

            <div class="flex justify-start pt-4 border-t border-noireText/5">
                <button type="submit" class="w-full sm:w-auto px-8 py-3 bg-deepWine hover:bg-noireText text-velvet font-medium uppercase tracking-widest text-xs rounded-xl transition-all shadow-md">
                    Commit to Catalog
                </button>
            </div>

        </form>
    </div>
</div>
{% endblock %}
